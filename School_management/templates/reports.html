{% extends "base.html" %}

{% block title %}Reports & Analytics - Admin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold"><i class="fas fa-chart-line me-2 text-primary"></i>Advanced Analytics Dashboard</h2>
        </div>
    </div>

    <div class="row g-4">
        <!-- Revenue Chart -->
        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="m-0 fw-bold">Monthly Revenue Trend (Le)</h5>
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" style="max-height: 350px;"></canvas>
                </div>
            </div>
        </div>

        <!-- Enrollment Distribution -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="m-0 fw-bold">Enrollment by Course</h5>
                </div>
                <div class="card-body d-flex align-items-center">
                    <canvas id="enrollmentChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 text-center">
            <p class="text-muted">For detailed data exports, please use the desktop dashboard.</p>
        </div>
    </div>
</div>

<!-- Chart Implementation -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Revenue Chart
        const revCtx = document.getElementById('revenueChart').getContext('2d');
        new Chart(revCtx, {
            type: 'line',
            data: {
                labels: [{% for r in revenue_data %}'{{ r.month }}'{% if not loop.last %}, {% endif %}{% endfor %}].reverse(),
                datasets: [{
                    label: 'Total Revenue',
                    data: [{% for r in revenue_data %}{{ r.total }}{% if not loop.last %}, {% endif %}{% endfor %}].reverse(),
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // Enrollment Chart
        const enCtx = document.getElementById('enrollmentChart').getContext('2d');
        new Chart(enCtx, {
            type: 'doughnut',
            data: {
                labels: [{% for e in enrollment_data %}'{{ e.course_name }}'{% if not loop.last %}, {% endif %}{% endfor %}],
                datasets: [{
                    data: [{% for e in enrollment_data %}{{ e.count }}{% if not loop.last %}, {% endif %}{% endfor %}],
                    backgroundColor: ['#2196F3', '#FFC107', '#9C27B0', '#F44336', '#009688', '#FF9800']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    });
</script>
{% endblock %}
