{% extends "base.html" %}

{% block title %}Bulk Messaging - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="m-0 fw-bold"><i class="fas fa-paper-plane me-2"></i>Send Bulk Announcements</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Audience:</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="target_type" id="all" value="all" checked>
                                <label class="form-check-label" for="all">All Students</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="target_type" id="course" value="course">
                                <label class="form-check-label" for="course">By Course</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="message" class="form-label fw-bold">Your Message:</label>
                        <textarea class="form-control" id="message" name="message" rows="6" placeholder="Type your announcement here..." required></textarea>
                        <div class="form-text mt-2 text-info">
                            <i class="fas fa-info-circle me-1"></i> This message will appear in the Student Portal.
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill shadow-sm">
                            <i class="fas fa-broadcast-tower me-2"></i>Post Announcement
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
