<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Developer Access - ProTech Assist SL Limited</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8fafc;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .dev-badge {
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .btn-dev {
            background: #3b82f6;
            border: none;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-dev:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .brand-text {
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="dev-badge"><i class="fas fa-code me-2"></i>Developer Gateway</div>
        <h2 class="brand-text mb-4">ProTech Assist SL Limited</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'danger' else 'primary' }} border-0 bg-opacity-10 py-2 small mb-4" style="background-color: rgba(239, 68, 68, 0.1); color: #fca5a5;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/protech-login" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small text-muted text-uppercase fw-bold">Developer ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-radius: 0.75rem 0 0 0.75rem; border-color: rgba(255, 255, 255, 0.1);"><i class="fas fa-at"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="drstrange001" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small text-muted text-uppercase fw-bold">Security Key</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-radius: 0.75rem 0 0 0.75rem; border-color: rgba(255, 255, 255, 0.1);"><i class="fas fa-shield-halved"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-dev mb-3">Authenticate Access</button>
            <a href="/" class="text-muted small text-decoration-none hover-white"><i class="fas fa-arrow-left me-1"></i> Return to Main Site</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
