# Firebase App Hosting configuration file
# See reference: https://firebase.google.com/docs/app-hosting/configure

# Runtime settings for the Cloud Run service
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets
env:
  # Database Connection String
  - variable: DATABASE_URL
    secret: DATABASE_URL@latest
    availability:
      - BUILD
      - RUNTIME

  # NextAuth Credentials & Settings
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
  - variable: AUTH_TRUST_HOST
    value: "true"
  - variable: NEXTAUTH_URL
    value: "https://inventory-web--protech-website-38a37.us-east4.hosted.app" # The live URL of the Inventory OS
  - variable: AUTH_URL
    value: "https://inventory-web--protech-website-38a37.us-east4.hosted.app"

  # Google OAuth Credentials
  - variable: GOOGLE_CLIENT_ID
    value: "750721710537-oa6fkvf8q8h6rvhg14nfdvsggnlvp7fb.apps.googleusercontent.com"
  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET

  # Email SMTP Settings for Invoices & Receipts
  - variable: SMTP_HOST
    value: "smtp.gmail.com"
  - variable: SMTP_PORT
    value: "465"
  - variable: SMTP_SECURE
    value: "true"
  - variable: SMTP_USER
    value: "protechassist36@gmail.com"
  - variable: SMTP_PASSWORD
    secret: SMTP_PASSWORD
  - variable: SMTP_FROM
    value: "Protech System <protechassist36@gmail.com>"

  # Super Admin notification email
  - variable: SUPERADMIN_EMAIL
    value: "protechassist36@gmail.com"

  # Gemini API Key for AI Features
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

  # Web Push VAPID Keys for Push Notifications
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: "BPtYEWypRCgRBnGztD0SH5YnqC2xOgO0c0Obf3YHRL3wmEYVUnoCwm18qDAIsbUJ3Ui2rhZsnOeHGOzcSH3vFyo"
  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
